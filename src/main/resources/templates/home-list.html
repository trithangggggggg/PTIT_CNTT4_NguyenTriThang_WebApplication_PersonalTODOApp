<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{home.title}">Todo List</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 th:text="#{home.title}">Todo List</h3>

        <div>
            <a th:href="@{/todos(lang='vi')}" class="btn btn-sm btn-outline-primary">
                Tiếng Việt
            </a>
            <a th:href="@{/todos(lang='en')}" class="btn btn-sm btn-outline-success">
                English
            </a>
            <a th:href="@{/logout}" class="btn btn-sm btn-secondary" th:text="#{home.logout}">
                Logout
            </a>
        </div>
    </div>

    <div class="alert alert-info">
        <strong th:text="#{home.ownerList}">List of:</strong>
        <span th:text="${session.ownerName}"></span>
    </div>

    <div class="mb-3">
        <a th:href="@{/add}" class="btn btn-primary" th:text="#{home.add}">
            Add New Todo
        </a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="thead-dark">
        <tr>
            <th th:text="#{todo.id}">ID</th>
            <th th:text="#{todo.content}">Content</th>
            <th th:text="#{todo.dueDate}">Due Date</th>
            <th th:text="#{todo.status}">Status</th>
            <th th:text="#{todo.priority}">Priority</th>
            <th colspan="2" th:text="#{todo.action}">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="todo : ${todos}">
            <td scope="row" th:text="${todo.id}"></td>
            <td th:text="${todo.content}"></td>
            <td th:text="${todo.dueDate}"></td>
            <td th:switch="${todo.status.name()}">
                <span th:case="'PENDING'" th:text="#{status.pending}"></span>
                <span th:case="'IN_PROGRESS'" th:text="#{status.inProgress}"></span>
                <span th:case="'COMPLETED'" th:text="#{status.completed}"></span>
                <span th:case="'CANCELLED'" th:text="#{status.cancelled}"></span>
            </td>

            <td th:switch="${todo.priority.name()}">
                <span th:case="'LOW'" th:text="#{priority.low}"></span>
                <span th:case="'MEDIUM'" th:text="#{priority.medium}"></span>
                <span th:case="'HIGH'" th:text="#{priority.high}"></span>
                <span th:case="'URGENT'" th:text="#{priority.urgent}"></span>
            </td>

            <td>
                <a th:href="@{/edit/{id}(id=${todo.id})}"
                   class="btn btn-warning"
                   th:text="#{todo.edit}">
                    Edit
                </a>
            </td>

            <td>
                <a th:href="@{/delete/{id}(id=${todo.id})}"
                   class="btn btn-danger"
                   th:onclick="|return confirm('#{todo.confirmDelete}');|"
                   th:text="#{todo.delete}">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
