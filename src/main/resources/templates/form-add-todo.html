<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ADD TODO</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <style>
        .error {
            color: red;
        }
    </style>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<form th:action="@{/save}" method="post" th:object="${todo}">

    <input type="hidden" th:field="*{id}">

    <div class="form-group">
        <label>Content</label>
        <input type="text" th:field="*{content}"
               class="form-control" placeholder="them content..">
        <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
    </div>

    <div class="form-group">
        <label>Due Date</label>
        <input type="datetime-local"
               th:field="*{dueDate}"
               class="form-control">
        <p class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></p>
    </div>

    <div class="form-group">
        <label>Status</label>
        <select class="form-control" th:field="*{status}">
            <option value="PENDING">PENDING</option>
            <option value="IN_PROGRESS">IN_PROGRESS</option>
            <option value="COMPLETED">COMPLETED</option>
            <option value="CANCELLED">CANCELLED</option>
        </select>
        <p class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
    </div>

    <div class="form-group">
        <label>Priority</label>
        <select class="form-control" th:field="*{priority}">
            <option value="LOW">LOW</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="HIGH">HIGH</option>
            <option value="URGENT">URGENT</option>
        </select>
        <p class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>
    <a th:href="@{/}" class="btn btn-secondary">Quay lai</a>
</form>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
