<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{form.title}">Todo Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        .error {
            color: red;
        }
    </style>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 th:text="#{form.title}">Todo Form</h3>

        <div>
            <a th:href="@{/add(lang='vi')}" class="btn btn-sm btn-outline-primary">
                Tiếng Việt
            </a>
            <a th:href="@{/add(lang='en')}" class="btn btn-sm btn-outline-success">
                English
            </a>
        </div>
    </div>

    <form th:action="@{/save}" method="post" th:object="${todo}">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label th:text="#{todo.content}">Content</label>
            <input type="text"
                   th:field="*{content}"
                   class="form-control"
                   th:placeholder="#{form.contentPlaceholder}">
            <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
        </div>

        <div class="form-group">
            <label th:text="#{todo.dueDate}">Due Date</label>
            <input type="datetime-local"
                   th:field="*{dueDate}"
                   class="form-control">
            <p class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></p>
        </div>

        <div class="form-group">
            <label th:text="#{todo.status}">Status</label>
            <select class="form-control" th:field="*{status}">
                <option value="PENDING" th:text="#{status.pending}">PENDING</option>
                <option value="IN_PROGRESS" th:text="#{status.inProgress}">IN_PROGRESS</option>
                <option value="COMPLETED" th:text="#{status.completed}">COMPLETED</option>
                <option value="CANCELLED" th:text="#{status.cancelled}">CANCELLED</option>
            </select>
            <p class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
        </div>

        <div class="form-group">
            <label th:text="#{todo.priority}">Priority</label>
            <select class="form-control" th:field="*{priority}">
                <option value="LOW" th:text="#{priority.low}">LOW</option>
                <option value="MEDIUM" th:text="#{priority.medium}">MEDIUM</option>
                <option value="HIGH" th:text="#{priority.high}">HIGH</option>
                <option value="URGENT" th:text="#{priority.urgent}">URGENT</option>
            </select>
            <p class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>
        </div>

        <button type="submit" class="btn btn-primary" th:text="#{form.submit}">
            Submit
        </button>

        <a th:href="@{/todos}" class="btn btn-secondary" th:text="#{form.back}">
            Back
        </a>

    </form>

</div>

</body>
</html>
